[profile.default]
evm_version = "osaka"
solc = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true
src = "src"
out = "out"
libs = ["dependencies"]
remappings = [
    "forge-std/=dependencies/forge-std-1.16.1/src/",
    "@openzeppelin/contracts/=dependencies/@openzeppelin-contracts-5.6.1/",
    "@openzeppelin/contracts-upgradeable/=dependencies/@openzeppelin-contracts-upgradeable-5.6.1/",
    "@symbioticfi/core/=dependencies/symbiotic-core-main/"
]
fs_permissions = [{ access = "read-write", path = "./"}]
gas_reports = ["*"]
gas_limit = "18446744073709551615"
# Some warnings should be omitted:
# - https://github.com/OpenZeppelin/openzeppelin-contracts/issues/5577
ignored_warnings_from = [
    "dependencies/@openzeppelin-contracts-5.6.1/proxy/Proxy.sol",
    "dependencies/@openzeppelin-contracts-5.6.1/proxy/utils/Initializable.sol",
    "dependencies/@openzeppelin-contracts-5.6.1/utils/cryptography/ECDSA.sol",
    "dependencies/@openzeppelin-contracts-5.6.1/utils/ReentrancyGuard.sol",
    "dependencies/@openzeppelin-contracts-5.6.1/utils/structs/Checkpoints.sol",
    "dependencies/@openzeppelin-contracts-5.6.1/utils/structs/EnumerableSet.sol",

    "dependencies/symbiotic-core-main/src/contracts/common/MigratableEntityProxy.sol",
    "dependencies/symbiotic-core-main/src/contracts/libraries/Checkpoints.sol",
    "dependencies/symbiotic-core-main/src/contracts/slasher/Slasher.sol",
    "dependencies/symbiotic-core-main/src/contracts/vault/Vault.sol",
    "dependencies/symbiotic-core-main/test/integration/base/SymbioticCoreBindingsBase.sol",
    "dependencies/symbiotic-core-main/test/integration/SymbioticCoreBindings.sol",
    "dependencies/symbiotic-core-main/test/integration/SymbioticCoreConstants.sol",

    "test/mocks/SimpleStakerRewards.sol",
]

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"@openzeppelin-contracts-upgradeable" = "5.6.1"
symbiotic-core = { version = "main", git = "https://github.com/StackOverflowExcept1on/symbiotic-core.git", branch = "main" }

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
holesky = "${ETH_RPC_URL_HOLESKY}"

[fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "params_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4

[lint]
exclude_lints = ["erc20-unchecked-transfer", "unsafe-typecast"]

[fuzz]
runs = 4096
max_test_rejects = 262144


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
